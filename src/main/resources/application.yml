spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: couple-movie
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration
      - org.springframework.ai.autoconfigure.transformers.TransformersEmbeddingModelAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/couple_movie}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: ${DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      maximum-pool-size: 25
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_CLOUD_PROJECT:your-project-id}
          location: ${LOCATION:us-central1}
          chat:
            options:
              model: gemini-1.5-flash

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 384
        initialize-schema: false

  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
            scope: ${GOOGLE_SCOPE:email, profile}
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

app:
  meilisearch:
    url: ${MEILISEARCH_URL:http://localhost:7700}
    api-key: ${MEILISEARCH_API_KEY:masterKey}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  omdb:
    api-key: ${OMDB_API_KEY:placeholder}
    url: ${OMDB_URL:http://www.omdbapi.com/}

  tmdb:
    api-key: ${TMDB_API_KEY:placeholder}

  ai:
    enabled: ${AI_ENABLED:true}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
