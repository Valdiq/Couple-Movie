spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: couple-movie
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: ${DATASOURCE_DRIVER_CLASS_NAME}
    hikari:
      maximum-pool-size: 25

  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM}
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: ${GOOGLE_SCOPE}
            redirect-uri: ${GOOGLE_REDIRECT_URI}

app:
  meilisearch:
    url: ${MEILISEARCH_URL}
    api-key: ${MEILISEARCH_API_KEY}

  frontend:
    url: ${FRONTEND_URL}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}

  omdb:
    api-key: ${OMDB_API_KEY}
    url: ${OMDB_URL}

  tmdb:
    api-key: ${TMDB_API_KEY}

  ai:
    api-key: ${AI_API_KEY}

server:
  port: ${SERVER_PORT}
